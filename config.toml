# dan editor configuration
# Copy to ~/.config/dan/config.toml to customise.

# Wrap long lines (true) or scroll horizontally (false) [Kbd: ^G].
wrap_lines = true

# Tab width in spaces.
tab_width = 4

# Expand tabs to spaces (true = spaces, false = literal tabs).
expand_tab = false

# Show line numbers in the gutter
line_numbers = true

# Highlight active line
highlight_active = true 

# Lines of offset/padding to keep above/below the cursor when scrolling
scroll_off = 5

# Color theme (currently only "default").
theme = "default"

# Show "^H Help" in the gutter TODO: not implemented
show_help = true

